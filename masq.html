<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masquerade Farewell</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ─── PARTICLES ─────────────────────────────── */
  #particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    background: #fff;
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
    10%  { opacity: 0.5; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* ─── INTRO ──────────────────────────────────── */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: #000;
  }
  #mask-wrap {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    animation: maskZoomOut 2.5s cubic-bezier(0.16,1,0.3,1) 0.5s both;
  }
  @keyframes maskZoomOut {
    from { transform: scale(8); opacity: 0; filter: blur(20px); }
    to   { transform: scale(1); opacity: 1; filter: blur(0); }
  }
  #mask-img {
    width: 100vw; height: 100vh;
    object-fit: contain; object-position: center;
  }

  /* ─── OVERLAY TEXT ───────────────────────────── */
  #text-adieu {
    position: fixed; inset: 0; z-index: 150;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
    animation: textFadeIn 1.2s ease 3.5s forwards;
  }
  #text-adieu span {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(3rem, 9vw, 8rem);
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.98);
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0 2rem;
    line-height: 1.2;
  }
  #text-welcome {
    position: fixed; inset: 0; z-index: 150;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
    animation: textFadeIn 1.2s ease 10s forwards;
  }
  #text-welcome span {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1.6rem, 4.5vw, 4rem);
    color: #e8e8e8;
    text-shadow: 0 2px 10px rgba(0,0,0,0.98);
    text-align: center;
    padding: 0 3rem;
    line-height: 1.5;
    max-width: 900px;
  }
  @keyframes textFadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  .fade-out   { animation: fadeOut 1.5s ease forwards !important; }
  .slide-away { animation: slideAway 1.5s cubic-bezier(0.7,0,1,0.3) forwards !important; }
  @keyframes fadeOut    { to { opacity: 0; pointer-events: none; } }
  @keyframes slideAway  { to { opacity: 0; transform: translateY(-40px) scale(0.95); pointer-events: none; } }

  /* ─── LOGIN SCENE ────────────────────────────── */
  #login-scene {
    position: fixed; inset: 0; z-index: 200;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 1.8s ease;
  }
  #login-scene.active { opacity: 1; pointer-events: all; }

  /* ─── SCROLL WRAPPER ─────────────────────────── */
  /*
    The scroll image is portrait ~500×620px visible parchment.
    We position it as a background and lay content over the inner parchment area.
    Inner parchment starts ~18% from top, ends ~18% from bottom,
    left ~14%, right ~14% (approx after removing the ornament bars).
  */
  .scroll-outer {
    position: relative;
    /* Natural scroll proportions: roughly 1 : 1.28 (w:h) */
    width:  min(430px, 88vw);
    height: min(550px, 88vw * 1.28);
    /* Make height scale with width */
    aspect-ratio: 430 / 550;
  }

  .scroll-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: fill;  /* stretch to exactly fill the box */
  }

  /* Content sits on the parchment area inside the ornamental bars */
  .scroll-content {
    position: absolute;
    /* fine-tuned to sit within the parchment, clear of top/bottom ornaments */
    top: 17%;
    bottom: 17%;
    left: 13%;
    right: 13%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .scroll-crest {
    font-size: 1.4rem;
    color: #3B2008;
    margin-bottom: 2px;
  }
  .scroll-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(1rem, 3.5vw, 1.45rem);
    color: #2C1A08;
    letter-spacing: 0.03em;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 2px;
  }
  .scroll-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(0.55rem, 1.5vw, 0.68rem);
    color: #6B4220;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }
  .scroll-divider {
    width: 75%;
    height: 1px;
    background: linear-gradient(to right, transparent, #8B6010, transparent);
    margin: 4px 0 8px;
  }

  .field-group { width: 100%; margin-bottom: 7px; }
  .field-label {
    display: block;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(0.52rem, 1.4vw, 0.65rem);
    color: #6B4220;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .field-input {
    width: 100%;
    background: rgba(180,130,60,0.10);
    border: none;
    border-bottom: 1px solid rgba(92,61,30,0.45);
    color: #2C1A08;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.75rem, 2vw, 0.92rem);
    padding: 4px 2px;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.25s, background 0.25s;
  }
  .field-input:focus {
    border-bottom-color: #5C3D1E;
    background: rgba(180,130,60,0.18);
  }
  .field-input::placeholder {
    color: rgba(92,61,30,0.38);
    font-style: italic;
  }

  .enter-btn {
    width: 100%;
    margin-top: 8px;
    padding: 6px 4px;
    background: rgba(92,61,30,0.12);
    border: 1px solid rgba(92,61,30,0.45);
    color: #2C1A08;
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.25s;
  }
  .enter-btn:hover { background: rgba(92,61,30,0.24); }
  .enter-btn:active { transform: scale(0.98); }

  .error-msg {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: #7a2a0a;
    font-size: clamp(0.55rem, 1.5vw, 0.72rem);
    text-align: center;
    margin-top: 4px;
    min-height: 1em;
  }
</style>
</head>

<script>
// Particles
const pc = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const s = 1 + Math.random() * 2;
  p.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;--drift:${(Math.random()-.5)*180}px;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*-22}s;`;
  pc.appendChild(p);
}

// Timeline
setTimeout(() => document.getElementById('text-adieu').classList.add('slide-away'), 8500);
setTimeout(() => {
  document.getElementById('text-welcome').classList.add('slide-away');
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('intro').style.display = 'none';
    document.getElementById('login-scene').classList.add('active');
    try { const a=document.getElementById('bg-audio'); a.volume=0.15; a.play().catch(()=>{}); } catch(e) {}
  }, 1800);
}, 15500);

// Login
function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();
  const err  = document.getElementById('error-msg');
  if (!user || !pass) { err.textContent = 'Pray, fill in both fields, dear soul.'; return; }
  if (pass.toLowerCase() !== 'farewell2026') { err.textContent = 'The password doth not match. Try again.'; return; }
  err.style.color = '#2a5c2a';
  err.textContent = 'The gates open for thee…';
  setTimeout(() => alert('Welcome to the Grand Masquerade Farewell!'), 800);
}
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });
</script>
